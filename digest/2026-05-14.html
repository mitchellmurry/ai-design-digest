<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>AI + Design Daily Digest — 2026-05-14</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #FAFAF8;
            --surface: #FFFFFF;
            --ink: #1A1915;
            --ink-secondary: #6B6860;
            --ink-tertiary: #9C9890;
            --accent: #E85D26;
            --accent-soft: #FFF0EB;
            --border: #E8E6E1;
            --border-strong: #D4D1CB;
        }

        body {
            font-family: 'Manrope', system-ui, -apple-system, sans-serif;
            font-size: 15px;
            line-height: 1.65;
            color: var(--ink);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Header */
        header {
            padding: 3rem 0 2rem;
            border-bottom: 1px solid var(--border);
        }

        .header-meta {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.75rem;
        }

        h1 {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: clamp(2rem, 5vw, 2.75rem);
            font-weight: 400;
            line-height: 1.15;
            color: var(--ink);
            letter-spacing: -0.02em;
        }

        .date {
            font-size: 0.875rem;
            color: var(--ink-tertiary);
            margin-top: 0.75rem;
        }

        /* Golden Nuggets */
        .nuggets {
            padding: 2rem 0;
            border-bottom: 1px solid var(--border);
        }

        .nuggets-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1.25rem;
        }

        .nuggets ul {
            list-style: none;
        }

        .nuggets li {
            padding: 0.875rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9375rem;
            line-height: 1.5;
        }

        .nuggets li:last-child {
            border-bottom: none;
        }

        .nuggets a {
            color: var(--ink);
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .nuggets a:hover {
            color: var(--accent);
        }

        .nuggets .source-tag {
            font-size: 0.75rem;
            color: var(--ink-tertiary);
            margin-left: 0.5rem;
        }

        /* Category sections */
        .category {
            padding: 2rem 0;
            border-bottom: 1px solid var(--border);
        }

        .category:last-child {
            border-bottom: none;
        }

        .category-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--ink);
            display: inline-block;
        }

        /* Article */
        .article {
            padding: 1.25rem 0;
            border-bottom: 1px solid var(--border);
        }

        .article:last-child {
            border-bottom: none;
        }

        .article-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 0.375rem;
        }

        .article-title a {
            color: var(--ink);
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .article-title a:hover {
            color: var(--accent);
        }

        .article-meta {
            font-size: 0.75rem;
            color: var(--ink-tertiary);
            margin-bottom: 0.625rem;
            letter-spacing: 0.01em;
        }

        .article-summary {
            font-size: 0.875rem;
            color: var(--ink-secondary);
            line-height: 1.6;
        }

        /* Footer */
        footer {
            padding: 2rem 0;
            text-align: center;
            font-size: 0.75rem;
            color: var(--ink-tertiary);
        }

        footer a {
            color: var(--ink-secondary);
            text-decoration: none;
        }

        footer a:hover {
            color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 0 1.25rem;
            }

            header {
                padding: 2rem 0 1.5rem;
            }

            h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-meta">Daily Digest</div>
            <h1>AI + Design</h1>
            <div class="date">2026-05-14</div>
        </header>

        
        

        

        

        <footer>
            <p>Curated by <a href="https://github.com/mitchellmurry">Mitch Murry</a>. Built with Hermes Agent.</p>
        </footer>
    </div>
</body>
</html>
